spring.application.name=laleo-backend

# 8080 costuma estar ocupada por outros projetos Java nesta máquina
server.port=8081

# Banco em memória para desenvolvimento; PostgreSQL entra via profile prod
spring.datasource.url=jdbc:h2:mem:laleo
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# Uploads de áudio (gravações curtas)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

management.endpoints.web.exposure.include=health,info

# speech-service (análise de pronúncia). Se estiver fora do ar, o backend
# cai automaticamente para a análise mock.
laleo.fala.url=http://localhost:8090

# Conversa com IA. A chave NUNCA vai para o cliente — configure via variável
# de ambiente LALEO_IA_CHAVE. Sem chave, o app usa respostas demo locais.
# laleo.ia.chave definida via env: LALEO_IA_CHAVE=sk-ant-...
laleo.ia.modelo=claude-opus-4-8
